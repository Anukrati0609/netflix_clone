<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img width="290" height="310" src="pokemon_yay.jpg" alt="Pokemon Indigo League">
    <img src="pokemon.jpg" alt="Pokemon Image">
    <br> <!-- break tag--> 
    <table>
        <caption>All me here</caption>
        <thead>headers
        
        <tr>
            <th>Name</th>
            <th>Place</th>
            <th>Age</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Anukrati</td>
            <td>Jabalpur</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Shrivastava</td>
            <td>College</td>
            <td>;</td>
            <!-- colspan, rowspan are used to put same data on 2 or more rows/columns.
             <td colspan="2">Yayy</td>-->
        </tr>
    </tbody>
    <tfoot>
        <tr>
        <td colspan="2">Me again 
        </td>
        <td rowspan="2">foot</td>
        </tr>
        </tfoot>
        </table>
    
 <!-- types of lists- ordered unordered definition-->                             
<ul type="square">
<li>Abcd</li>
<li>efgh</li>
<li>ijkl</li>
</ul>
<ol type="I">
    <li>ooh</li>
    <li>its</li>
    <li>nice</li>
</ol>
</body>
</html>
