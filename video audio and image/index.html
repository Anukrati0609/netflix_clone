<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <video src="video.mp4" width="300" controls autoplay loop poster="poster.jpg"></video>
    <!--attributes for video tag are src, controls(play, pause, etc) muted, poster= thumbnail,width,height-->
    <audio src="audio.opus" controls></audio>
    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="red">
    </svg>
    <!--SVG: high graphics vector images. SVG is used to create images eg circle,square etc. video,audio,svg are inline elements-->
    <!--iframes is used to embed another website in your website-->
    
    <!--<iframe src="http://127.0.0.1:5500/video%20audio%20and%20image/index.html" frameborder="5" height="500" width="500"></iframe>-->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=W_y0XLW3NzD2XS3y&amp;start=722" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>

</html>
