<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Form to apply for Lab TA</h1>
    <form action="post">
        <div>
            <label for="username">Enter username</label>
            <input type="text" id="username" name="usename" placeholder="Enter username">
        </div>
        <div>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Mmale</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <div>
            <textarea name="comments" rows="4" cols="20">
                Enter your comments.
            </textarea>
        <!-- Can be otherwise used as...
         <label for="comment">Enter your comment </label>
         <br>
         textarea, id, name, row column as it is -->
        </div>
        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="apple">mango</option>
                <option value="apple">cherryl</option>
            </select>
        </div>
    </form>
</body>

</html>
