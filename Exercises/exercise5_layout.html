<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        :root {
            /* --color: pink;*/
            --seccolor: skyblue;
        }

        body {
            background-color: black;
            margin: 0px;
            padding: 0px;
        }

        ul {
            background-color: palevioletred;
            display: flex;
            position: sticky;
            flex-direction: row;
            column-gap: 300px;
            height: 50px;
            font-size: large;
            margin: 0px;
            padding: 0px;
        }

        li {
            display: block;
        }

        a {
            color: white;
        }

        a:hover {
            color: aqua;

        }

        a:visited {
            color: wheat;
        }

        .boxes {
            display: flex;
            position: relative;
            background-color: green;
            flex-direction: row;
            column-gap: 20px;
            top: 20px;
            left: 50px;
            width: 1415px;
            height: 500px;
            justify-content: center;

        }

        .box1 {
            background-color: pink;
            position: relative;
            width: 400px;
            height: 400px;
            top: 40px;
        }

        .boxes :nth-child(2) {
            background-color: var(--seccolor);
            position: relative;
            width: 400px;
            height: 400px;
            top: 40px;
        }

        .boxI {
            position: relative;
            border: 2px solid white;
            border-radius: 20px;
            text-align: center;
            font-size: xx-large;
            color: white;
            top: 50px;
            width: 500px;
            left: 530px;
            height: 100px;
        }

        .logo {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 1000;

        }

        .logo img {
            width: 50px;
            height: 50px;
            /* display: flex;
            text-align: right;*/
            border-radius: 50%;
            object-fit: cover;
        }

        .footer {
            position: relative;
            background-color: whitesmoke !important;

            display: flex;
            flex-direction: row;
            column-gap: 200px;
            top: 100px;
            width: 100%;
            font-size: large;
            margin: 0px;
            padding: 10px;
            overflow: hidden;
            width: auto;
        }

        .footer ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            background-color: whitesmoke;
        }


        .footer li {
            display: inline-block;
            color: black;
            /* Ensure contrast */
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="header">
        <ul>
            <li> <a href="https://www.google.com">Google</a></li>
            <li><a href="https://www.wikipedia.com">Wikipedia</a></li>
            <li><a href="https://www.youtube.com">Youtube</a></li>
            <li><a href="https://www.linkedin.com">Linkedin</a></li>
        </ul>
    </div>
    </div>
    <div class="boxes">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
    <div class="boxI">Welcome to the
        <br> Web Dev Course Express
    </div>
    <div class="footer">
        <ul>
            <li>Services</li>
            <li>About</li>
        </ul>
    </div>
    <div class="logo"><img
            src="https://itspectrumsolutions.com/wp-content/uploads/2024/04/1_pE2fOVDikEUwiQJlh4ggzg.jpeg" alt="logo">
    </div>

</body>

</html>
