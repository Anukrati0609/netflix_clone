<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form asking deets</title>
</head>

<body>
    <h1>Address Form</h1>
    <form action="post">
        <div>
            <label for="your_name">Enter your name</label>
            <input type="text" id="your_name" name="your name" placeholders="Enter name">
        </div>
        <div>
            <label for="address">Enter your address</label>
            <input type="text" id="address" name="your address" placeholders="Enter address">
        </div>
        <div>
            <label for="pin">Enter your pin</label>
            <input type="text" id="pin" name="your pin" placeholders="Enter pin">
        </div>
    </form>
</body>

</html>
