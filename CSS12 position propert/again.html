<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            border: 2px solid black;
            height: 133px;
            margin: 3px;
            padding: 3px;
            width: 80vw;
            filter: invert(100%);
        }

        .box1 {
            background-color: red;
            /*position: absolute; */
            position: sticky;
            top: 0px;
        }
        /*_____IMP____transform, filter and perspective properties can also make an element appear as postitioned__________________________________*/

        .box2 {
            background-color: green;
            margin-top: 20px; /* Use margin instead of position */
            margin-left: 56px;
        }

        .box3 {
            background-color: blueviolet;
            position: fixed;
            bottom: 0px;
            left: 25vw;
        }

        .box4 {
            background-color: azure;
        }
        /*AGAR PARENT POSITIONED H TOH CHILD USKE RESPECT ME HI TOP, BOTTOM, ETC ALIGN HOGA. OTHERWISE WITH RESPECT TO HTML*/

        .parent {
            padding: 20px;
            margin: 34px; 
            border: 3px solid peru;
            display: flow-root; /* Ensures parent wraps all child elements */
            /*position: absolute;*/
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
