<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }



        .box {
            border: 2px solid black;
            height: 133px;
            margin: 3px;
            padding: 3px;
            width: 80vw;
        }

        .box1 {
            background-color: red;
        }

        .box2 {
            background-color: green;
            /*position: relative;
            top: 20px;
            left: 56px;*/
        }

        .box3 {
            background-color: blueviolet;
        }

        .box4 {
            background-color: azure;
        }

        .parent {
            padding: 20px;
            margin: 34px;
            border: 3px solid peru;
            display: grid;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="parent">
      <div class=" box1"></div>

      <div class="box2"></div>
      <div class="box3"></div>
      <div class="box4"></div>
      <div class="box5"></div>
</body>

</html>
