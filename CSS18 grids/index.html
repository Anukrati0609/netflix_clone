<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridss</title>
    <style>
        .container {
            border: 2px solid black;
            display: grid;
            grid-template-columns:[firsty][secondy]200px 400px ;
            grid-template-rows: 100px 100px 100px;
            width: 80vw;
            grid-template-columns: 1fr 2fr 1fr;
        }

        .items {
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }
        .item-4{
            grid-row: 1/2 ;
            grid-column: 1/2;
        }
        .item-1{
            grid-row: 1/2;
            grid-column: 1/2;
            /*grid-row-start: 1;
            grid: row end 2px;
            THIS AND WHAT'S WRITTEN ABOVE ARE THE SAME THINGS*/
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="items item-1">1</div>
        <div class="items">2</div>
        <div class="items">3</div>
        <div class="items item-4">4</div>
        <div class="items">5</div>
    </div>
</body>

</html>
